<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Python in Browser with Brython</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.13.1/brython_stdlib.js"></script>
</head>
<body onload="brython()">
    <h1>This is a Brython test</h1>
    <script type="text/python">
        import sys, os
        from browser import document, console, bind, html
        console.log('Console log from python', 1 + 2)
        console.log('  Python version:', sys.version)
        console.log('  Current working directory:', os.getcwd())
        console.log('  OS environment:', os.environ)
        @bind('#my_button', 'click')
        def greet(event):
            document["result"] <= html.P("Hello, World!")
    </script>

    <button id="my_button">Click me</button>
    <div id="result"></div>
</body>
</html>
