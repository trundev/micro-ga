<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Python in Browser with Pyodide</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
</head>
<body>
    <h1>This is a Pyodide test</h1>
    <!-- Code based on https://pyodide.org/en/stable/usage/index.html#web-browsers -->
    <script type="text/javascript">
        async function main(){
            let pyodide = await loadPyodide();
            pyodide.runPython(`
                import sys, os
                import js
                js.console.log('Console log from Pyodide')
                js.console.log('  Python version:', sys.version)
                js.console.log('  Current working directory:', os.getcwd())
                js.console.log('  OS environment:', os.environ)
                js.document.body.innerHTML += '<p>Hello from Pyodide!</p>'
            `);
        }
        main();
        async function check_numpy(){
            let pyodide = await loadPyodide();
            await pyodide.loadPackage("numpy");
            pyodide.runPython(`
                import numpy as np
                import js
                js.document.body.innerHTML += f'<p>numpy: {np.__version__}</p>'
                mtx = np.diag(np.arange(3) + 10)
                js.document.body.innerHTML += f'<p>Matrix: <div>{mtx}</div></p>'
                eigvals, eigvecs = np.linalg.eig(mtx)
                js.document.body.innerHTML += f'<p>Eigen values: <div>{eigvals}</div></p>'
                js.document.body.innerHTML += f'<p>Eigen vectors: <div>{eigvecs}</div></p>'
            `);
        }
        check_numpy();
        async function check_micro_ga(){
            let pyodide = await loadPyodide();
            micropip = await pyodide.loadPackage('micropip');

            // Download a package from GitHub
            const response = await fetch('../archive/refs/heads/main.zip');
            const pythonCode = await response.text();
            pyodide.FS.writeFile('/micro_ga.zip', await response.text());
            // Install it using micropip
            await pyodide.runPythonAsync(`
                import micropip
                await micropip.install('/micro_ga.zip')
                print(micropip.__version__)
            `);
        }
        check_micro_ga();
    </script>
</body>
</html>
